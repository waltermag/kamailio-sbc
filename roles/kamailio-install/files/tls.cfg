[server:default]
method = TLSv1.2+
verify_certificate = no
require_certificate = no
private_key = /usr/local/etc/kamailio/privkey.pem
certificate = /usr/local/etc/kamailio/fullchain.pem

[client:default]
method = TLSv1.2+
verify_certificate = no
require_certificate = no
private_key = /usr/local/etc/kamailio/privkey.pem
certificate = /usr/local/etc/kamailio/fullchain.pem
