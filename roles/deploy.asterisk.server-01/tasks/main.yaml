---
- name: Create asterisk1 config folder
  file:
    path: "{{ asterisk_deploy_path }}"
    state: directory

- name: Create the Asterisk Server-1
  docker_container:
    name: asterisk1
    image: mlan/asterisk:full-1.1.8
    state: started
    restart_policy: unless-stopped
    ports:
      - "8080:80"
      - "5060:5060/udp"
      - "5060:5060"
      - "5061:5061"
      - "10000-10099:10000-10099/udp"
    env:
      SYSLOG_LEVEL: "4"
      HOSTNAME: "test1.docker.localhost"
      PULSE_SERVER: "unix:/run/pulse/socket"
      PULSE_COOKIE: "/run/pulse/cookie"
      WEBSMSD_PORT: "80"
    volumes:
      - "/home/sip/asterisk1/asterisk:/usr/share/asterisk/config:ro"
      - "/home/sip/asterisk1/pulse:/run/pulse:rshared"
      - "/etc/localtime:/etc/localtime:ro"

- name: Copy asterisk config files
  synchronize:
    src: asterisk
    dest: "{{ asterisk_deploy_path }}"
    archive: no
    delete: yes
    recursive: yes
  notify: Restart Asterisk-1

- name: Stop Asterisk container
  docker_container:
    name: asterisk1
    state: stopped
  when: "'remove_asterisk' in ansible_run_tags or 'tear_down' in ansible_run_tags"
  tags:
    - never
    - remove_asterisk
    - tear_down
