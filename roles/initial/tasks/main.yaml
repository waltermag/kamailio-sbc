- name: Update APT cache and install available updates
  apt:
    upgrade: yes
    update_cache: yes
  tags:
    - system
    - apt
- name: Install build tools
  apt:
    pkg:
      - autoconf
      - automake
      - build-essential
      - curl
      - git
      - git-core
      - gnupg2
      - libjansson-dev
      - libncurses5-dev
      - libnewt-dev
      - libsqlite3-dev
      - libssl-dev
      - libtool
      - libxml2-dev
      - sqlite3
      - subversion
      - unzip
      - uuid-dev
      - wget
      - ncdu
      - vim
      - libedit-dev
    state: latest
    update_cache: true
  tags:
    - system
    - apt
